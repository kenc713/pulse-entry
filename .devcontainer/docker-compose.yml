version: '3.8'

services:
  pulse-entry:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: pulse-entry:dev
    container_name: pulse-entry-dev
    volumes:
      - ..:/workspace
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
